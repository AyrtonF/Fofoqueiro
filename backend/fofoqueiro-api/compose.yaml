services:
  postgres:
    image: postgres:16-alpine
    container_name: fofoqueiro-postgres
    environment:
      POSTGRES_DB: fofoqueirodb
      POSTGRES_PASSWORD: fofoqueiro
      POSTGRES_USER: fofoqueiro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fofoqueiro -d fofoqueirodb"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fofoqueiro-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fofoqueirodb
      SPRING_DATASOURCE_USERNAME: fofoqueiro
      SPRING_DATASOURCE_PASSWORD: fofoqueiro
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      APP_DEFAULT_TENANT_ID: 1
    ports:
      - '${API_PORT:-8081}:8080'

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fofoqueiro-rabbitmq
    environment:
      RABBITMQ_DEFAULT_PASS: secret
      RABBITMQ_DEFAULT_USER: myuser
    ports:
      - '5672:5672'
      - '15672:15672'

volumes:
  postgres_data:
