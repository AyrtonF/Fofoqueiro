spring.application.name=fofoqueiro
server.port=${SERVER_PORT:8080}

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fofoqueirodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fofoqueiro}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fofoqueiro}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.baseline-on-migrate=true

# Application Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.tenant.default-id=${APP_DEFAULT_TENANT_ID:1}
app.bootstrap.tenant.name=${APP_BOOTSTRAP_TENANT_NAME:Fofoqueiro}
app.bootstrap.tenant.domain=${APP_BOOTSTRAP_TENANT_DOMAIN:localhost}
app.bootstrap.white-label.logo-url=${APP_BOOTSTRAP_WHITE_LABEL_LOGO_URL:/images/logo.png}
app.bootstrap.white-label.primary-color=${APP_BOOTSTRAP_WHITE_LABEL_PRIMARY_COLOR:#0f172a}
app.bootstrap.white-label.secondary-color=${APP_BOOTSTRAP_WHITE_LABEL_SECONDARY_COLOR:#3b82f6}
app.bootstrap.white-label.favicon-url=${APP_BOOTSTRAP_WHITE_LABEL_FAVICON_URL:/images/favicon.ico}

app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:ayrtonleonardo14@gmail.com}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.bootstrap.admin.first-name=${APP_BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
app.bootstrap.admin.last-name=${APP_BOOTSTRAP_ADMIN_LAST_NAME:Sistema}
app.bootstrap.admin.role=${APP_BOOTSTRAP_ADMIN_ROLE:ADMIN}
app.bootstrap.admin.mfa-enabled=${APP_BOOTSTRAP_ADMIN_MFA_ENABLED:false}

# Mail Sender Configuration (for EmailServiceAdapterImpl)
# Use Mailtrap or a similar service for development
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.security.fofoqueiro=DEBUG

